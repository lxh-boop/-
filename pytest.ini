[pytest]
markers =
    fast: fast unit tests that do not start a browser/server or call external services
    integration: integration tests, including Streamlit AppTest checks
    e2e: end-to-end tests that start a server or drive a browser
    external: tests that require external services, credentials, network APIs, or heavyweight optional models
    slow: tests that are expected to take materially longer than normal unit tests
testpaths =
    tests
