experiment:
  name: retrieval_only
  mode: retrieval

retrieval:
  top_k: 10
  decision_time_filter: true
  use_existing_project_config: true

metrics:
  deterministic:
    - id_context_precision
    - id_context_recall
    - recall_at_k
    - precision_at_k
    - hit_rate_at_k
    - mrr
    - ndcg_at_k
    - future_leak_rate
    - wrong_stock_rate
    - duplicate_event_rate
    - direct_evidence_rate
  llm_based: []

quality_gates:
  future_leak_rate:
    max: 0.0
  wrong_stock_rate:
    max: 0.02
  duplicate_event_rate:
    max: 0.10

runtime:
  max_workers: 2
  timeout_seconds: 120
  retry_count: 2
  judge_language: chinese
  adapt_prompts: false
  adapt_prompt_instruction: false
  response_relevancy_strictness: 1
  save_intermediate_results: true
